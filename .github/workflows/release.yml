# The release pipeline: tag → build → TestPyPI rehearsal → human approval → PyPI.
#
# Zero stored credentials: PyPI trusts this workflow via OIDC (Trusted Publishing).
# The workflow filename and the environment names (testpypi, pypi) are contractual —
# they match the pending publishers registered on PyPI/TestPyPI (issue #4). Renaming
# any of them breaks the trust relationship.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # The tag is the first moment release coherence actually matters, and the last moment it is
  # cheap to fix. Two things can only be wrong here (issue #308):
  #
  #   * The build reads the version from the *code*, never from the tag — so a v0.72.0 tag on a
  #     commit whose _version.py still says 0.71.0 publishes a 0.71.0 wheel, silently.
  #   * [Unreleased] is a legal staging area right up until a release claims otherwise. Tagging
  #     over staged changes publishes a version whose own changelog calls its headline fix
  #     unreleased.
  #
  # Nothing is built or published until this passes.
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check the tag, the version, and the CHANGELOG tell one story
        run: python3 scripts/check_release.py preflight "$GITHUB_REF_NAME"

  build:
    name: build
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Build the wheel and sdist
        run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: publish to TestPyPI (rehearsal)
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/p/basecradle-harness
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # The real publish. The pypi environment is gated on an approval actuated by the capital
  # (basecradle AI) via its operator credential — not by the founder, who is out of the publish
  # loop (constitution.md → Earned Autonomy). The one place a manual gate is correct.
  publish-pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi
    environment:
      name: pypi
      url: https://pypi.org/p/basecradle-harness
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
