# The release pipeline: tag → build → TestPyPI rehearsal → human approval → PyPI.
#
# Zero stored credentials: PyPI trusts this workflow via OIDC (Trusted Publishing).
# The workflow filename and the environment names (testpypi, pypi) are contractual —
# they match the pending publishers registered on PyPI/TestPyPI (issue #4). Renaming
# any of them breaks the trust relationship.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Build the wheel and sdist
        run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: publish to TestPyPI (rehearsal)
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/p/basecradle-harness
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # The real publish. The pypi environment requires a human approval (Drawk) —
  # the one place in this repository where a manual gate is correct.
  publish-pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi
    environment:
      name: pypi
      url: https://pypi.org/p/basecradle-harness
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
